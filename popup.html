<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ChatGPT 问题导航</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <header class="header">
        <div class="mark" aria-hidden="true">问</div>
        <div>
          <p class="eyebrow">ChatGPT Navigator</p>
          <h1>问题导航</h1>
        </div>
      </header>

      <section class="status-card" aria-label="扩展状态">
        <span id="statusDot" class="status-dot" aria-hidden="true"></span>
        <div>
          <p id="statusTitle" class="status-title">正在检查当前页面...</p>
          <p id="statusText" class="status-text">请稍候。</p>
        </div>
      </section>

      <section class="info-card" aria-label="开源版本">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Open Source</p>
            <h2>GPL-3.0 开源版</h2>
          </div>
          <span class="status-badge is-on">本地运行</span>
        </div>
        <p class="info-text">
          安装后即可在 ChatGPT 网页端生成问题目录。扩展只在当前页面内工作，不上传、不保存你的聊天内容。
        </p>
      </section>

      <button id="refreshButton" class="primary-button" type="button" disabled>
        刷新问题列表
      </button>

      <p class="note">
        仅在 chatgpt.com 和 chat.openai.com 生效。打开或刷新 ChatGPT 对话页后，右侧会出现“问题导航”。
      </p>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
