<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ChatGPT Question Navigator — Product Film</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #151716;
        --muted: #666d69;
        --mint: #10a37f;
        --paper: #f7f6f2;
        --line: rgba(21, 23, 22, 0.13);
      }

      * { box-sizing: border-box; }

      body {
        min-height: 100vh;
        margin: 0;
        background:
          radial-gradient(circle at 12% 10%, rgba(221, 244, 236, 0.9), transparent 28rem),
          radial-gradient(circle at 92% 80%, rgba(228, 242, 255, 0.9), transparent 34rem),
          var(--paper);
        color: var(--ink);
        font-family: "Aptos", "Segoe UI Variable", "Segoe UI", sans-serif;
      }

      .page {
        display: grid;
        gap: 18px;
        width: min(1280px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 24px 0 32px;
      }

      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        padding: 14px 16px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.84);
        box-shadow: 0 16px 48px rgba(40, 46, 43, 0.08);
        backdrop-filter: blur(18px);
      }

      .title { display: grid; gap: 3px; }
      .title strong { font-size: 16px; letter-spacing: -0.02em; }
      .title span { color: var(--muted); font-size: 12px; }
      .actions { display: flex; flex-wrap: wrap; gap: 8px; }

      button {
        min-height: 40px;
        border: 1px solid transparent;
        border-radius: 999px;
        padding: 0 17px;
        background: var(--mint);
        color: white;
        cursor: pointer;
        font: inherit;
        font-size: 13px;
        font-weight: 750;
      }

      button.secondary {
        border-color: var(--line);
        background: rgba(255, 255, 255, 0.88);
        color: var(--ink);
      }

      button:disabled { cursor: wait; opacity: 0.5; }

      .stage-wrap {
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 22px;
        background: white;
        box-shadow: 0 30px 90px rgba(34, 39, 36, 0.14);
      }

      canvas {
        display: block;
        width: 100%;
        aspect-ratio: 16 / 9;
        background: var(--paper);
      }

      .status {
        min-height: 20px;
        margin: 0;
        color: var(--muted);
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="toolbar" aria-label="Video controls">
        <div class="title">
          <strong>Question Navigator — 37 second product film</strong>
          <span id="profileLabel">1920 × 1080 · 60 fps · supplied royalty-free soundtrack</span>
        </div>
        <div class="actions">
          <button id="playButton" type="button">Play preview</button>
          <button id="restartButton" class="secondary" type="button">Restart</button>
          <button id="exportButton" class="secondary" type="button">Export MP4</button>
        </div>
      </section>

      <section class="stage-wrap" aria-label="Product film preview">
        <canvas id="stage" width="1920" height="1080"></canvas>
      </section>

      <p id="status" class="status">Loading source recordings…</p>
    </main>

    <script>
      const WIDTH = 1920;
      const HEIGHT = 1080;
      const DURATION = 37;
      const params = new URLSearchParams(location.search);
      const PROFILE = params.get("profile") === "github" ? "github" : "master";
      const FPS = Number(params.get("fps")) || (PROFILE === "github" ? 30 : 60);
      const VIDEO_BITRATE = Number(params.get("bitrate")) || (PROFILE === "github" ? 4000000 : 12000000);
      const SOURCE_CHAT = "/__source/chat.mp4";
      const SOURCE_NAV = "/__source/nav.mp4";
      const SOURCE_MUSIC = "/marketing/video/assets/grand_project-wonders-of-the-earth-550792.mp3";
      const OUTPUT_NAME = PROFILE === "github"
        ? "question-navigator-demo-github.mp4"
        : "question-navigator-demo-master-1080p.mp4";

      const COLORS = {
        ink: "#151716",
        muted: "#666d69",
        paper: "#f7f6f2",
        mint: "#10a37f",
        mintSoft: "#ddf4ec",
        lavender: "#e7e9ff",
        sky: "#e4f2ff",
        peach: "#ffe9da",
        white: "#ffffff"
      };

      const canvas = document.getElementById("stage");
      const ctx = canvas.getContext("2d", { alpha: false });
      const playButton = document.getElementById("playButton");
      const restartButton = document.getElementById("restartButton");
      const exportButton = document.getElementById("exportButton");
      const statusText = document.getElementById("status");
      const profileLabel = document.getElementById("profileLabel");
      profileLabel.textContent = `1920 × 1080 · ${FPS} fps · supplied royalty-free soundtrack`;

      let animationFrame = 0;
      let playbackStartedAt = 0;
      let playing = false;
      let audioContext = null;
      let audioNodes = [];
      let musicBytes = null;
      let musicBuffer = null;
      let clipTimers = [];

      const clipSpecs = [
        { id: "askOne", source: SOURCE_CHAT, outputStart: 2, outputEnd: 2.7, sourceStart: 59.7727, sourceEnd: 62 },
        { id: "askTwo", source: SOURCE_CHAT, outputStart: 2.7, outputEnd: 4.9, sourceStart: 84, sourceEnd: 92 },
        { id: "askThree", source: SOURCE_CHAT, outputStart: 4.9, outputEnd: 7.5, sourceStart: 111, sourceEnd: 122 },
        { id: "categories", source: SOURCE_CHAT, outputStart: 7.5, outputEnd: 15.5, sourceStart: 157.5, sourceEnd: 169.5 },
        { id: "labels", source: SOURCE_CHAT, outputStart: 15.5, outputEnd: 22.5, sourceStart: 142.5, sourceEnd: 157 },
        { id: "jump", source: SOURCE_NAV, outputStart: 22.5, outputEnd: 31.5, sourceStart: 2.2, sourceEnd: 25.2 }
      ].map((spec) => ({
        ...spec,
        rate: (spec.sourceEnd - spec.sourceStart) / (spec.outputEnd - spec.outputStart),
        video: null
      }));

      function clamp(value, min = 0, max = 1) {
        return Math.min(Math.max(value, min), max);
      }

      function mix(a, b, amount) {
        return a + (b - a) * amount;
      }

      function easeOut(value) {
        return 1 - Math.pow(1 - clamp(value), 3);
      }

      function easeInOut(value) {
        const x = clamp(value);
        return x < 0.5 ? 4 * x * x * x : 1 - Math.pow(-2 * x + 2, 3) / 2;
      }

      function progress(time, start, end) {
        return clamp((time - start) / (end - start));
      }

      function sceneOpacity(time, start, end, fade = 0.45) {
        return Math.min(progress(time, start, start + fade), 1 - progress(time, end - fade, end));
      }

      function roundedPath(x, y, width, height, radius) {
        const r = Math.min(radius, width / 2, height / 2);
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + width, y, x + width, y + height, r);
        ctx.arcTo(x + width, y + height, x, y + height, r);
        ctx.arcTo(x, y + height, x, y, r);
        ctx.arcTo(x, y, x + width, y, r);
        ctx.closePath();
      }

      function fillRound(x, y, width, height, radius, color) {
        roundedPath(x, y, width, height, radius);
        ctx.fillStyle = color;
        ctx.fill();
      }

      function strokeRound(x, y, width, height, radius, color, lineWidth = 2) {
        roundedPath(x, y, width, height, radius);
        ctx.strokeStyle = color;
        ctx.lineWidth = lineWidth;
        ctx.stroke();
      }

      function drawBackground(time, accent = COLORS.mintSoft) {
        ctx.fillStyle = COLORS.paper;
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        const drift = Math.sin(time * 0.28) * 26;
        const gradient = ctx.createRadialGradient(1480 + drift, 170, 20, 1480 + drift, 170, 620);
        gradient.addColorStop(0, `${accent}cc`);
        gradient.addColorStop(1, `${accent}00`);
        ctx.fillStyle = gradient;
        ctx.fillRect(760, 0, 1160, 800);

        ctx.save();
        ctx.globalAlpha = 0.55;
        ctx.fillStyle = COLORS.sky;
        ctx.beginPath();
        ctx.arc(80, 960, 330, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        ctx.save();
        ctx.globalAlpha = 0.065;
        ctx.fillStyle = COLORS.ink;
        for (let y = 54; y < HEIGHT; y += 42) {
          for (let x = 54; x < WIDTH; x += 42) {
            ctx.beginPath();
            ctx.arc(x, y, 1.35, 0, Math.PI * 2);
            ctx.fill();
          }
        }
        ctx.restore();
      }

      function drawMark(x, y, scale = 1, showName = true) {
        ctx.save();
        ctx.translate(x, y);
        ctx.scale(scale, scale);
        fillRound(0, 0, 58, 58, 17, COLORS.mint);
        ctx.fillStyle = COLORS.white;
        ctx.font = "800 31px 'Aptos Display', 'Segoe UI Variable', sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("Q", 29, 30);
        if (showName) {
          ctx.textAlign = "left";
          ctx.fillStyle = COLORS.ink;
          ctx.font = "720 23px 'Aptos', 'Segoe UI Variable', sans-serif";
          ctx.fillText("QUESTION NAVIGATOR", 78, 30);
        }
        ctx.restore();
      }

      function drawEyebrow(text, x, y, alpha = 1) {
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = COLORS.mint;
        ctx.font = "700 20px 'Aptos', 'Segoe UI Variable', sans-serif";
        ctx.letterSpacing = "2px";
        ctx.textAlign = "left";
        ctx.fillText(text.toUpperCase(), x, y);
        ctx.restore();
      }

      function drawHeadline(lines, x, y, size, alpha = 1, maxWidth = 1500) {
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = COLORS.ink;
        ctx.font = `650 ${size}px 'Aptos Display', 'Segoe UI Variable', sans-serif`;
        ctx.textAlign = "left";
        ctx.textBaseline = "top";
        const lineHeight = size * 0.98;
        lines.forEach((line, index) => ctx.fillText(line, x, y + index * lineHeight, maxWidth));
        ctx.restore();
      }

      function drawBody(text, x, y, size, alpha = 1) {
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = COLORS.muted;
        ctx.font = `500 ${size}px 'Aptos', 'Segoe UI Variable', sans-serif`;
        ctx.textAlign = "left";
        ctx.textBaseline = "top";
        ctx.fillText(text, x, y);
        ctx.restore();
      }

      function drawPill(text, x, y, fill, color = COLORS.ink, alpha = 1) {
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.font = "650 22px 'Aptos', 'Segoe UI Variable', sans-serif";
        const width = ctx.measureText(text).width + 42;
        fillRound(x, y, width, 48, 24, fill);
        ctx.fillStyle = color;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(text, x + width / 2, y + 25);
        ctx.restore();
        return width;
      }

      function drawVideoCrop(video, source, dest, radius = 28, alpha = 1, zoom = 1) {
        if (!video || video.readyState < 2) return;
        const { sx, sy, sw, sh } = source;
        const { x, y, w, h } = dest;
        const zw = sw / zoom;
        const zh = sh / zoom;
        const zx = sx + (sw - zw) / 2;
        const zy = sy + (sh - zh) / 2;

        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.shadowColor = "rgba(28, 33, 30, 0.18)";
        ctx.shadowBlur = 52;
        ctx.shadowOffsetY = 22;
        fillRound(x, y, w, h, radius, COLORS.white);
        ctx.shadowColor = "transparent";
        roundedPath(x, y, w, h, radius);
        ctx.clip();
        ctx.drawImage(video, zx, zy, zw, zh, x, y, w, h);
        ctx.restore();
        strokeRound(x, y, w, h, radius, "rgba(21,23,22,0.12)", 2);
      }

      function drawCursorRipple(x, y, phase, color = COLORS.mint) {
        const p = clamp(phase);
        ctx.save();
        ctx.globalAlpha = (1 - p) * 0.5;
        ctx.strokeStyle = color;
        ctx.lineWidth = 5 - p * 3;
        ctx.beginPath();
        ctx.arc(x, y, 18 + p * 38, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }

      function getActiveClip(time) {
        return clipSpecs.find((clip) => time >= clip.outputStart && time < clip.outputEnd) || null;
      }

      function drawProductLayout(clip, time, alpha, options = {}) {
        if (!clip) return;
        const sceneP = easeInOut(options.sceneProgress || 0);
        const lift = mix(28, 0, sceneP);
        const zoom = 1 + sceneP * 0.018;
        // Include the navigator's full left edge. The previous crop started
        // inside the panel and clipped the filter pills and card borders.
        const panel = clip.id === "jump"
          ? { sx: 72, sy: 140, sw: 480, sh: 1100 }
          : { sx: 104, sy: 140, sw: 480, sh: 1100 };
        const chat = { sx: 845, sy: 180, sw: 1370, sh: 833 };

        drawVideoCrop(
          clip.video,
          chat,
          { x: 570, y: 174 + lift, w: 1240, h: 764 },
          34,
          alpha,
          zoom
        );
        drawVideoCrop(
          clip.video,
          panel,
          { x: 110, y: 190 - lift * 0.35, w: 410, h: 746 },
          30,
          alpha,
          1 + sceneP * 0.01
        );

        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.strokeStyle = "rgba(16,163,127,0.55)";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(516, 566);
        ctx.bezierCurveTo(540, 536, 552, 536, 576, 548);
        ctx.stroke();
        ctx.restore();
      }

      function drawOpening(time) {
        drawBackground(time, COLORS.mintSoft);
        const p = easeOut(progress(time, 0, 1.25));
        const leave = 1 - easeInOut(progress(time, 3.05, 3.5));
        const alpha = p * leave;

        ctx.save();
        ctx.globalAlpha = alpha * 0.96;
        fillRound(1260, 120, 510, 244, 96, COLORS.mintSoft);
        fillRound(1454, 326, 316, 224, 88, COLORS.lavender);
        fillRound(1180, 520, 590, 300, 110, COLORS.peach);
        fillRound(1400, 785, 370, 170, 78, COLORS.sky);
        ctx.restore();

        drawMark(120, 106, 1, true);
        drawEyebrow("A local-first browser extension", 126, 276, alpha);
        drawHeadline(["ChatGPT", "Question Navigator"], 118, 326, 112, alpha, 1020);
        drawBody("Turn long conversations into a working index.", 126, 586, 36, alpha);

        const lineP = easeOut(progress(time, 0.6, 2.1));
        ctx.save();
        ctx.globalAlpha = alpha * 0.85;
        ctx.fillStyle = COLORS.mint;
        ctx.fillRect(126, 678, 430 * lineP, 5);
        ctx.restore();
      }

      function drawAskScene(time) {
        drawBackground(time, COLORS.sky);
        const alpha = sceneOpacity(time, 2, 7.5);
        const clip = getActiveClip(time);
        const p = progress(time, 2, 7.5);
        drawMark(96, 76, 0.76, true);
        drawEyebrow("01 · Capture", 98, 160, alpha);
        drawProductLayout(clip, time, alpha, { sceneProgress: p });

        const captionP = easeOut(progress(time, 2, 2.75));
        ctx.save();
        ctx.globalAlpha = alpha * captionP;
        // Keep the lower-third outside the navigator card so the final
        // questions remain visible throughout the capture montage.
        fillRound(110, 948, 460, 106, 30, COLORS.white);
        ctx.fillStyle = COLORS.ink;
        ctx.font = "650 40px 'Aptos Display', 'Segoe UI Variable', sans-serif";
        ctx.textAlign = "left";
        ctx.fillText("Ask naturally.", 142, 1000);
        ctx.fillStyle = COLORS.muted;
        ctx.font = "500 18px 'Aptos', 'Segoe UI Variable', sans-serif";
        ctx.fillText("Questions are indexed as you chat.", 142, 1035);
        ctx.restore();

        const number = time < 2.7 ? "02" : time < 4.9 ? "04" : "06";
        drawPill(`${number} questions indexed`, 1422, 94, COLORS.sky, COLORS.ink, alpha);
      }

      function drawCategoriesScene(time) {
        drawBackground(time, COLORS.lavender);
        const alpha = sceneOpacity(time, 7.5, 15.5);
        const clip = getActiveClip(time);
        const p = progress(time, 7.5, 15.5);
        drawMark(96, 76, 0.76, true);
        drawEyebrow("02 · Organize", 98, 160, alpha);
        drawProductLayout(clip, time, alpha, { sceneProgress: p });

        ctx.save();
        ctx.globalAlpha = alpha;
        fillRound(110, 948, 1020, 106, 30, COLORS.white);
        ctx.fillStyle = COLORS.ink;
        ctx.font = "650 36px 'Aptos Display', 'Segoe UI Variable', sans-serif";
        ctx.fillText("Every question finds its place.", 146, 1013);
        ctx.restore();

        let x = 700;
        [
          ["Code", COLORS.sky],
          ["Solutions", COLORS.lavender],
          ["Research", COLORS.mintSoft]
        ].forEach(([label, fill], index) => {
          const reveal = easeOut(progress(time, 8.35 + index * 0.28, 9.1 + index * 0.28));
          x += drawPill(label, x, 977, fill, COLORS.ink, alpha * reveal) + 12;
        });
        drawCursorRipple(486, 336, (time * 0.72) % 1, COLORS.mint);
      }

      function drawLabelsScene(time) {
        drawBackground(time, COLORS.peach);
        const alpha = sceneOpacity(time, 15.5, 22.5);
        const clip = getActiveClip(time);
        const p = progress(time, 15.5, 22.5);
        drawMark(96, 76, 0.76, true);
        drawEyebrow("03 · Curate", 98, 160, alpha);
        drawProductLayout(clip, time, alpha, { sceneProgress: p });

        ctx.save();
        ctx.globalAlpha = alpha;
        fillRound(110, 948, 596, 106, 30, COLORS.white);
        ctx.fillStyle = COLORS.ink;
        ctx.font = "650 40px 'Aptos Display', 'Segoe UI Variable', sans-serif";
        ctx.fillText("Save. Label. Refine.", 142, 1000);
        ctx.fillStyle = COLORS.muted;
        ctx.font = "500 18px 'Aptos', 'Segoe UI Variable', sans-serif";
        ctx.fillText("Keep the questions that matter close.", 142, 1035);
        ctx.restore();

        const rippleTime = time < 19 ? progress(time, 16.4, 17.25) : progress(time, 19.8, 20.65);
        drawCursorRipple(508, 428, rippleTime, "#e58a45");
      }

      function drawJumpScene(time) {
        drawBackground(time, COLORS.mintSoft);
        const alpha = sceneOpacity(time, 22.5, 31.5);
        const clip = getActiveClip(time);
        const p = progress(time, 22.5, 31.5);
        drawMark(96, 76, 0.76, true);
        drawEyebrow("04 · Return", 98, 160, alpha);
        drawProductLayout(clip, time, alpha, { sceneProgress: p });

        ctx.save();
        ctx.globalAlpha = alpha;
        fillRound(110, 948, 650, 106, 30, COLORS.white);
        ctx.fillStyle = COLORS.ink;
        ctx.font = "650 40px 'Aptos Display', 'Segoe UI Variable', sans-serif";
        ctx.fillText("Jump back instantly.", 142, 1000);
        ctx.fillStyle = COLORS.muted;
        ctx.font = "500 18px 'Aptos', 'Segoe UI Variable', sans-serif";
        ctx.fillText("From the index to the original answer.", 142, 1035);
        ctx.restore();

        const pulse = (time * 0.9) % 1;
        drawCursorRipple(548, 470, pulse, COLORS.mint);
        ctx.save();
        ctx.globalAlpha = alpha * (0.45 + 0.3 * Math.sin(time * 4));
        ctx.strokeStyle = COLORS.mint;
        ctx.lineWidth = 6;
        ctx.beginPath();
        ctx.moveTo(518, 560);
        ctx.bezierCurveTo(590, 500, 620, 500, 700, 518);
        ctx.stroke();
        ctx.restore();
      }

      function drawEndCard(time) {
        drawBackground(time, COLORS.lavender);
        const p = easeOut(progress(time, 31.5, 32.6));
        const alpha = p * (1 - easeInOut(progress(time, 36.65, 37)) * 0.08);

        ctx.save();
        ctx.globalAlpha = alpha;
        fillRound(1110, 86, 630, 266, 112, COLORS.mintSoft);
        fillRound(1380, 318, 360, 220, 92, COLORS.sky);
        fillRound(1020, 542, 720, 352, 130, COLORS.peach);
        fillRound(1260, 850, 480, 118, 54, COLORS.lavender);
        ctx.restore();

        drawMark(120, 108, 1.04, true);
        drawEyebrow("Question Navigator for ChatGPT", 126, 290, alpha);
        drawHeadline(["Find the question.", "Return to the answer."], 118, 340, 94, alpha, 980);
        drawBody("A local-first working index for long conversations.", 126, 570, 32, alpha);

        let x = 126;
        [
          ["Local-first", COLORS.mintSoft],
          ["Open source", COLORS.sky],
          ["Chrome & Edge", COLORS.lavender]
        ].forEach(([label, fill], index) => {
          const reveal = easeOut(progress(time, 32.45 + index * 0.2, 33.25 + index * 0.2));
          x += drawPill(label, x, 662, fill, COLORS.ink, alpha * reveal) + 14;
        });

        ctx.save();
        ctx.globalAlpha = alpha;
        fillRound(126, 782, 840, 92, 30, "rgba(255,255,255,0.88)");
        ctx.fillStyle = COLORS.ink;
        ctx.font = "600 29px 'Aptos', 'Segoe UI Variable', sans-serif";
        ctx.textAlign = "left";
        ctx.textBaseline = "middle";
        ctx.fillText("github.com/172917/ChatGPT-Question-Navigator", 166, 829);
        ctx.restore();
      }

      function drawTransition(time, boundary, fromColor, toColor) {
        const p = progress(time, boundary - 0.24, boundary + 0.26);
        if (p <= 0 || p >= 1) return;
        const sweep = p < 0.5 ? easeInOut(p * 2) : 1 - easeInOut((p - 0.5) * 2);
        const width = WIDTH * sweep;
        const x = p < 0.5 ? 0 : WIDTH - width;
        const gradient = ctx.createLinearGradient(x, 0, x + Math.max(width, 1), 0);
        gradient.addColorStop(0, fromColor);
        gradient.addColorStop(1, toColor);
        ctx.save();
        ctx.globalAlpha = 0.92;
        ctx.fillStyle = gradient;
        ctx.fillRect(x, 0, width, HEIGHT);
        ctx.restore();
      }

      function drawScene(time) {
        if (time < 2) drawOpening(time);
        else if (time < 7.5) drawAskScene(time);
        else if (time < 15.5) drawCategoriesScene(time);
        else if (time < 22.5) drawLabelsScene(time);
        else if (time < 31.5) drawJumpScene(time);
        else drawEndCard(time);

        [
          [2, COLORS.mintSoft, COLORS.sky],
          [7.5, COLORS.sky, COLORS.lavender],
          [15.5, COLORS.lavender, COLORS.peach],
          [22.5, COLORS.peach, COLORS.mintSoft],
          [31.5, COLORS.mintSoft, COLORS.lavender]
        ].forEach(([boundary, from, to]) => drawTransition(time, boundary, from, to));
      }

      function renderAt(time) {
        const safeTime = clamp(time, 0, DURATION);
        canvas.dataset.time = String(safeTime);
        drawScene(safeTime);
      }

      function waitForEvent(target, eventName, timeout = 12000) {
        return new Promise((resolve, reject) => {
          const timer = window.setTimeout(() => reject(new Error(`${eventName} timed out`)), timeout);
          target.addEventListener(eventName, () => {
            window.clearTimeout(timer);
            resolve();
          }, { once: true });
        });
      }

      async function seekVideo(video, time, timeout = 12000) {
        if (Math.abs(video.currentTime - time) <= 0.05 && !video.seeking && video.readyState >= 2) return;
        const seeked = waitForEvent(video, "seeked", timeout);
        video.currentTime = time;
        await seeked;
      }

      async function loadClip(clip) {
        const video = document.createElement("video");
        video.preload = "auto";
        video.muted = true;
        video.playsInline = true;
        video.crossOrigin = "anonymous";
        video.src = clip.source;
        clip.video = video;
        await waitForEvent(video, "loadeddata", 20000);
        await seekVideo(video, clip.sourceStart);
        video.playbackRate = clip.rate;
      }

      async function resetClips() {
        clearClipTimers();
        await Promise.all(clipSpecs.map(async (clip) => {
          clip.video.pause();
          await seekVideo(clip.video, clip.sourceStart, 8000);
          clip.video.playbackRate = clip.rate;
        }));
      }

      function clearClipTimers() {
        clipTimers.forEach((timer) => window.clearTimeout(timer));
        clipTimers = [];
        clipSpecs.forEach((clip) => clip.video?.pause());
      }

      function scheduleClipPlayback(offsetSeconds = 0) {
        clearClipTimers();
        clipSpecs.forEach((clip) => {
          if (clip.outputEnd <= offsetSeconds) return;
          const startDelay = Math.max(0, clip.outputStart - offsetSeconds);
          const sourceOffset = Math.max(0, offsetSeconds - clip.outputStart) * clip.rate;
          if (sourceOffset > 0) clip.video.currentTime = clip.sourceStart + sourceOffset;
          const startTimer = window.setTimeout(() => {
            clip.video.playbackRate = clip.rate;
            clip.video.play().catch(() => undefined);
          }, startDelay * 1000);
          const endTimer = window.setTimeout(() => clip.video.pause(), Math.max(0, clip.outputEnd - offsetSeconds) * 1000);
          clipTimers.push(startTimer, endTimer);
        });
      }

      function stopAudio() {
        audioNodes.forEach((node) => {
          try { node.stop?.(); } catch { /* already stopped */ }
          try { node.disconnect?.(); } catch { /* already disconnected */ }
        });
        audioNodes = [];
      }

      function scheduleOriginalSoundtrack(context, destination) {
        stopAudio();
        const now = context.currentTime + 0.06;
        const master = context.createGain();
        const compressor = context.createDynamicsCompressor();
        const lowpass = context.createBiquadFilter();
        master.gain.setValueAtTime(0.0001, now);
        master.gain.exponentialRampToValueAtTime(0.26, now + 0.8);
        master.gain.setValueAtTime(0.26, now + DURATION - 1.2);
        master.gain.exponentialRampToValueAtTime(0.0001, now + DURATION);
        lowpass.type = "lowpass";
        lowpass.frequency.value = 6200;
        lowpass.Q.value = 0.55;
        compressor.threshold.value = -18;
        compressor.knee.value = 20;
        compressor.ratio.value = 3.5;
        compressor.attack.value = 0.012;
        compressor.release.value = 0.24;
        master.connect(lowpass).connect(compressor).connect(destination);
        audioNodes.push(master, lowpass, compressor);

        function envelope(gain, start, attack, hold, release, level) {
          gain.gain.setValueAtTime(0.0001, start);
          gain.gain.exponentialRampToValueAtTime(level, start + attack);
          gain.gain.setValueAtTime(level * 0.78, start + attack + hold);
          gain.gain.exponentialRampToValueAtTime(0.0001, start + attack + hold + release);
        }

        function tone(frequency, start, duration, type, level, target = master, detune = 0) {
          const oscillator = context.createOscillator();
          const gain = context.createGain();
          oscillator.type = type;
          oscillator.frequency.value = frequency;
          oscillator.detune.value = detune;
          envelope(gain, start, 0.05, Math.max(0.02, duration * 0.58), duration * 0.34, level);
          oscillator.connect(gain).connect(target);
          oscillator.start(start);
          oscillator.stop(start + duration + 0.08);
          audioNodes.push(oscillator, gain);
        }

        function air(start, duration, level) {
          const frameCount = Math.max(1, Math.floor(context.sampleRate * duration));
          const buffer = context.createBuffer(1, frameCount, context.sampleRate);
          const data = buffer.getChannelData(0);
          for (let index = 0; index < frameCount; index += 1) {
            data[index] = (Math.random() * 2 - 1) * Math.pow(1 - index / frameCount, 1.6);
          }
          const source = context.createBufferSource();
          const gain = context.createGain();
          const bandpass = context.createBiquadFilter();
          bandpass.type = "bandpass";
          bandpass.frequency.value = 4200;
          bandpass.Q.value = 0.7;
          gain.gain.setValueAtTime(level, start);
          gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
          source.buffer = buffer;
          source.connect(bandpass).connect(gain).connect(master);
          source.start(start);
          source.stop(start + duration);
          audioNodes.push(source, gain, bandpass);
        }

        const beat = 60 / 96;
        const bar = beat * 4;
        const chords = [
          [220.00, 277.18, 329.63, 415.30],
          [174.61, 220.00, 261.63, 329.63],
          [196.00, 246.94, 293.66, 369.99],
          [146.83, 220.00, 261.63, 329.63]
        ];
        const bass = [55.00, 43.65, 49.00, 36.71];
        const pluck = [659.25, 554.37, 493.88, 554.37, 739.99, 659.25, 554.37, 493.88];

        for (let index = 0; index < 16; index += 1) {
          const start = now + index * bar;
          const padBus = context.createGain();
          const padFilter = context.createBiquadFilter();
          padBus.gain.value = 0.62;
          padFilter.type = "lowpass";
          padFilter.frequency.value = 1250;
          padFilter.Q.value = 0.45;
          padBus.connect(padFilter).connect(master);
          audioNodes.push(padBus, padFilter);
          chords[index % chords.length].forEach((frequency, voice) => {
            tone(frequency, start, bar * 0.97, "sine", 0.035, padBus, voice % 2 ? 5 : -5);
            tone(frequency * 2, start + 0.02, bar * 0.91, "triangle", 0.011, padBus, voice % 2 ? -7 : 7);
          });
          tone(bass[index % bass.length], start, bar * 0.78, "sine", 0.13);
        }

        for (let step = 0; step < 64; step += 1) {
          const start = now + step * beat;
          const frequency = pluck[step % pluck.length] * (step % 16 >= 12 ? 0.5 : 1);
          tone(frequency, start + 0.04, beat * 0.46, "triangle", step % 4 === 0 ? 0.048 : 0.032);
          if (step % 2 === 0) tone(72, start, beat * 0.24, "sine", 0.12);
          if (step % 4 === 2) air(start + beat * 0.5, 0.045, 0.018);
        }

        [2, 7.5, 15.5, 22.5, 31.5].forEach((second, index) => {
          const start = now + second - 0.16;
          air(start, 0.46, 0.055);
          tone(index % 2 ? 783.99 : 659.25, start + 0.12, 0.42, "sine", 0.055);
        });
      }

      async function loadMusic() {
        const response = await fetch(SOURCE_MUSIC);
        if (!response.ok) throw new Error(`Music loading failed (${response.status})`);
        musicBytes = await response.arrayBuffer();
      }

      async function scheduleMusic(context, destination, offsetSeconds = 0) {
        stopAudio();
        if (!musicBytes) await loadMusic();
        if (!musicBuffer) musicBuffer = await context.decodeAudioData(musicBytes.slice(0));

        const now = context.currentTime + 0.06;
        const source = context.createBufferSource();
        const gain = context.createGain();
        const compressor = context.createDynamicsCompressor();
        const remaining = Math.max(0.05, DURATION - offsetSeconds);
        const sourceOffset = musicBuffer.duration
          ? offsetSeconds % musicBuffer.duration
          : 0;
        const fadeInDuration = Math.min(0.8, remaining * 0.25);
        const fadeOutDuration = Math.min(1.2, remaining * 0.4);
        const fadeOutStart = Math.max(fadeInDuration, remaining - fadeOutDuration);

        source.buffer = musicBuffer;
        source.loop = musicBuffer.duration < remaining + sourceOffset;
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.24, now + fadeInDuration);
        gain.gain.setValueAtTime(0.24, now + fadeOutStart);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + remaining);
        compressor.threshold.value = -16;
        compressor.knee.value = 18;
        compressor.ratio.value = 3;
        compressor.attack.value = 0.01;
        compressor.release.value = 0.25;

        source.connect(gain).connect(compressor).connect(destination);
        source.start(now, sourceOffset);
        source.stop(now + remaining + 0.05);
        audioNodes.push(source, gain, compressor);
      }

      async function startAudio(destination = null, offsetSeconds = 0) {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) return null;
        if (!audioContext || audioContext.state === "closed") audioContext = new AudioContextClass();
        if (audioContext.state !== "running") await audioContext.resume();
        await scheduleMusic(audioContext, destination || audioContext.destination, offsetSeconds);
        return audioContext;
      }

      async function startPreview(reset = false) {
        if (playing) return;
        const offset = reset ? 0 : Number(canvas.dataset.time || 0);
        if (offset >= DURATION) return startPreview(true);
        await resetClips();
        playing = true;
        playbackStartedAt = performance.now() - offset * 1000;
        playButton.textContent = "Pause";
        scheduleClipPlayback(offset);
        startAudio(null, offset).catch(() => undefined);

        const loop = () => {
          const time = (performance.now() - playbackStartedAt) / 1000;
          renderAt(time);
          if (time >= DURATION) {
            stopPreview();
            renderAt(DURATION);
            return;
          }
          animationFrame = requestAnimationFrame(loop);
        };
        loop();
      }

      function stopPreview() {
        playing = false;
        cancelAnimationFrame(animationFrame);
        clearClipTimers();
        stopAudio();
        playButton.textContent = "Play preview";
      }

      function recordingMimeType() {
        return [
          'video/mp4;codecs="avc1.42E01E,mp4a.40.2"',
          'video/mp4;codecs="avc1.42E01E"',
          "video/mp4"
        ].find((type) => MediaRecorder.isTypeSupported(type)) || "";
      }

      async function exportVideo() {
        exportButton.disabled = true;
        playButton.disabled = true;
        restartButton.disabled = true;
        stopPreview();
        await resetClips();
        renderAt(0);
        statusText.textContent = `Exporting ${PROFILE} profile — about 37 seconds…`;

        const stream = canvas.captureStream(FPS);
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (AudioContextClass) {
          if (!audioContext || audioContext.state === "closed") audioContext = new AudioContextClass();
          if (audioContext.state !== "running") await audioContext.resume();
          const destination = audioContext.createMediaStreamDestination();
          await scheduleMusic(audioContext, destination, 0);
          destination.stream.getAudioTracks().forEach((track) => stream.addTrack(track));
        }

        const mimeType = recordingMimeType();
        if (!mimeType) throw new Error("This browser cannot export H.264 MP4.");
        const chunks = [];
        const recorder = new MediaRecorder(stream, {
          mimeType,
          videoBitsPerSecond: VIDEO_BITRATE,
          audioBitsPerSecond: 160000
        });
        recorder.ondataavailable = (event) => event.data?.size && chunks.push(event.data);
        const finished = new Promise((resolve, reject) => {
          recorder.onstop = resolve;
          recorder.onerror = () => reject(recorder.error || new Error("MediaRecorder failed"));
        });

        recorder.start(1000);
        scheduleClipPlayback(0);
        const exportStartedAt = performance.now();
        await new Promise((resolve) => {
          const frame = () => {
            const time = (performance.now() - exportStartedAt) / 1000;
            renderAt(time);
            if (time >= DURATION) {
              renderAt(DURATION);
              resolve();
              return;
            }
            requestAnimationFrame(frame);
          };
          frame();
        });

        recorder.stop();
        await finished;
        stream.getTracks().forEach((track) => track.stop());
        clearClipTimers();
        stopAudio();

        const blob = new Blob(chunks, { type: mimeType });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = OUTPUT_NAME;
        document.body.appendChild(link);
        link.click();
        link.remove();
        window.setTimeout(() => URL.revokeObjectURL(url), 1500);
        statusText.textContent = `Export complete · ${OUTPUT_NAME} · ${(blob.size / 1024 / 1024).toFixed(1)} MB`;
        exportButton.disabled = false;
        playButton.disabled = false;
        restartButton.disabled = false;
        return { name: OUTPUT_NAME, size: blob.size };
      }

      playButton.addEventListener("click", () => {
        if (playing) stopPreview();
        else startPreview(false).catch((error) => { statusText.textContent = error.message; });
      });

      restartButton.addEventListener("click", () => {
        stopPreview();
        canvas.dataset.time = "0";
        startPreview(true).catch((error) => { statusText.textContent = error.message; });
      });

      exportButton.addEventListener("click", () => {
        exportVideo().catch((error) => {
          statusText.textContent = `Export failed: ${error.message}`;
          exportButton.disabled = false;
          playButton.disabled = false;
          restartButton.disabled = false;
          clearClipTimers();
          stopAudio();
        });
      });

      window.startHeadlessExport = exportVideo;
      window.renderPromoFrame = (time) => renderAt(Number(time) || 0);

      Promise.all([...clipSpecs.map(loadClip), loadMusic()])
        .then(() => {
          statusText.textContent = `Assets ready · ${clipSpecs.length} synchronized clips + soundtrack · ${PROFILE} profile`;
          renderAt(0);
        })
        .catch((error) => {
          statusText.textContent = `Source loading failed: ${error.message}`;
        });
    </script>
  </body>
</html>
