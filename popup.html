<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ChatGPT 问题导航</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <header class="header">
        <div class="mark" aria-hidden="true">问</div>
        <div>
          <p id="eyebrow" class="eyebrow">ChatGPT Navigator</p>
          <h1 id="pageTitle">问题导航</h1>
        </div>
      </header>

      <section class="status-card" aria-label="扩展状态">
        <span id="statusDot" class="status-dot" aria-hidden="true"></span>
        <div>
          <p id="statusTitle" class="status-title">正在检查当前页面...</p>
          <p id="statusText" class="status-text">请稍候。</p>
        </div>
      </section>

      <section class="info-card" aria-label="开源版本">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Open Source</p>
            <h2 id="localTitle">本地智能整理</h2>
          </div>
          <span id="localBadge" class="status-badge is-on">本地运行</span>
        </div>
        <p id="localText" class="info-text">
          自动分类、搜索和收藏都在本机完成；不会上传或远程保存聊天内容。
        </p>
        <label class="setting-row" for="autoClassificationToggle">
          <span>
            <strong id="autoTitle">自动分类</strong>
            <small id="autoText">新问题会按内容自动分组。</small>
          </span>
          <input id="autoClassificationToggle" type="checkbox">
          <span class="switch-track" aria-hidden="true"></span>
        </label>
        <p id="labelCount" class="label-count">0 个全局标签</p>
        <label class="language-row" for="languageSelect">
          <span id="languageLabel">界面语言</span>
          <select id="languageSelect">
            <option value="auto">自动</option>
            <option value="zh-CN">简体中文</option>
            <option value="en">English</option>
          </select>
        </label>
      </section>

      <button id="refreshButton" class="primary-button" type="button" disabled>
        刷新问题列表
      </button>

      <p id="note" class="note">
        仅在 chatgpt.com 和 chat.openai.com 生效。打开或刷新 ChatGPT 对话页后，右侧会出现“问题导航”。
      </p>
    </main>

    <script src="i18n.js"></script>
    <script src="settings.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
